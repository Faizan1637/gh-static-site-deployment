name: Advanced Portfolio Deployment

on:
  push:
    branches: [ main, master ]
    paths:
      - 'components/**'
      - 'app/**'
      - 'next.config.mjs'
      - 'package.json'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  CACHE_NAME: 'build-cache'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Code
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Check TypeScript
        run: pnpm tsc --noEmit || true
      
      - name: Lint code
        run: pnpm lint || true

  build:
    needs: validate
    runs-on: ubuntu-latest
    name: Build Portfolio
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build with custom action
        uses: ./.github/actions/deploy-static
        with:
          node-version: ${{ env.NODE_VERSION }}
          build-command: 'pnpm run build'
          output-directory: 'out'
      
      - name: Cache build artifacts
        uses: actions/cache@v3
        with:
          path: out/
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-build
          path: out/
          retention-days: 30
          compression-level: 9

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: portfolio-build
          path: out/
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'out'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
      
      - name: Notify deployment
        uses: ./.github/actions/notify-deploy
        with:
          status: 'success'
          deployment-url: ${{ steps.deployment.outputs.page_url }}
      
      - name: Create deployment summary
        run: |
          echo "## 🎉 Portfolio Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📍 **Live URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "⏰ **Deployed at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    name: Send Notifications
    if: always()
    steps:
      - name: Set deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "DEPLOYMENT_STATUS=✅ SUCCESS" >> $GITHUB_ENV
          else
            echo "DEPLOYMENT_STATUS=❌ FAILED" >> $GITHUB_ENV
          fi
      
      - name: Create workflow summary
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.DEPLOYMENT_STATUS }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy Status:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
